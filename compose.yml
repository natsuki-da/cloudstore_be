services:
  cloudstore_be:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://db:3307/cloudstore_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  db:
    build:
      context: .
      dockerfile: db.Dockerfile
    environment:
      MYSQL_ROOT_PASSWORD: "password"
      MYSQL_DATABASE: "cloudstore_db"
      MYSQL_USER: "cloudstore_user"
      MYSQL_PASSWORD: "password"
      MYSQL_TCP_PORT: "3307"
    ports:
      - "3307:3307"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword" ]
      interval: 5s
      timeout: 5s
      retries: 5